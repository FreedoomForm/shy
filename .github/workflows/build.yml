name: Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci --ignore-scripts
      shell: bash

    - name: Build Windows installer
      run: npm run build:win
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: |
          dist/*.exe
          dist/*.blockmap
        retention-days: 30
        if-no-files-found: warn

    - name: Get version
      id: version
      run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      shell: bash

    - name: Create Release
      if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: Release v${{ steps.version.outputs.VERSION }}
        body: |
          ## Telegram MCP Manager v${{ steps.version.outputs.VERSION }}
          
          ### Features
          - Mistral AI is the default provider with pre-configured API key
          - 9 AI providers: Mistral, OpenAI, Google AI Studio, Anthropic, DeepSeek, GLM, xAI, Meta AI, Custom
          - Model selection dropdown for each provider
          - Save All Changes button in AI Settings
          - Default API credentials pre-configured
          - Auto-creates default account on first launch
          
          ### Installation
          Download the installer below and run it.
        files: dist/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

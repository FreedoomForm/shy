<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Telegram MCP Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
    }
    
    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #12121a;
      border-right: 1px solid #2a2a4e;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #2a2a4e;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #0088cc 0%, #0066aa 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .logo-text { font-size: 18px; font-weight: 700; color: #0088cc; }
    
    .accounts-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .account-item {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      background: #1a1a2e;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    
    .account-item:hover { background: #2a2a4e; }
    .account-item.active { border-color: #0088cc; background: #1a2a3e; }
    
    .account-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    
    .account-name { font-weight: 600; }
    
    .account-status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #666;
    }
    
    .account-status.connected { background: #00C851; color: #fff; }
    .account-status.disconnected { background: #ff4444; color: #fff; }
    
    .account-phone { font-size: 12px; color: #666; }
    
    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid #2a2a4e;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary { background: linear-gradient(135deg, #0088cc 0%, #0066aa 100%); color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,136,204,0.3); }
    .btn-danger { background: linear-gradient(135deg, #cc0000 0%, #aa0000 100%); color: #fff; }
    .btn-secondary { background: #2a2a4e; color: #fff; }
    .btn-success { background: linear-gradient(135deg, #00C851 0%, #009944 100%); color: #fff; }
    
    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .content-header {
      padding: 20px 24px;
      border-bottom: 1px solid #2a2a4e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .content-title { font-size: 24px; font-weight: 600; }
    
    .content-actions { display: flex; gap: 12px; }
    
    .content-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid #2a2a4e;
      padding-bottom: 16px;
    }
    
    .tab {
      padding: 10px 20px;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: #888;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .tab:hover { background: #1a1a2e; color: #fff; }
    .tab.active { background: #0088cc; color: #fff; }
    
    /* Cards */
    .card {
      background: #12121a;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid #2a2a4e;
    }
    
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
    }
    
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    
    .stat-card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    
    .stat-value { font-size: 32px; font-weight: 700; color: #0088cc; }
    .stat-label { font-size: 12px; color: #666; margin-top: 4px; }
    
    /* Form Elements */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; color: #888; margin-bottom: 8px; }
    
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
    }
    
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #0088cc;
    }
    
    .form-group textarea { min-height: 100px; resize: vertical; }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    
    /* Toggle Switch */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #2a2a4e;
    }
    
    .toggle-label { font-size: 14px; }
    .toggle-desc { font-size: 12px; color: #666; margin-top: 2px; }
    
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 26px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #666;
      border-radius: 26px;
      transition: 0.3s;
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    
    .toggle-switch input:checked + .toggle-slider { background: #0088cc; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(24px); }
    
    /* Messages */
    .messages-list {
      max-height: 500px;
      overflow-y: auto;
    }
    
    .message-item {
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      background: #1a1a2e;
    }
    
    .message-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .message-from { font-weight: 600; color: #0088cc; }
    .message-time { font-size: 12px; color: #666; }
    .message-text { font-size: 14px; line-height: 1.5; }
    
    .ai-response {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2a2a4e;
    }
    
    .ai-response-label {
      font-size: 12px;
      color: #00C851;
      margin-bottom: 6px;
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      display: none;
    }
    
    .modal-overlay.active { display: flex; }
    
    .modal {
      background: #12121a;
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    
    .modal-actions .btn { flex: 1; }
    
    /* AI Provider Select */
    .ai-provider-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .ai-provider-option {
      padding: 16px;
      border-radius: 12px;
      border: 2px solid #2a2a4e;
      background: #1a1a2e;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .ai-provider-option:hover { border-color: #0088cc; }
    .ai-provider-option.selected { border-color: #0088cc; background: #1a2a3e; }
    
    .ai-provider-name { font-weight: 600; margin-bottom: 4px; }
    .ai-provider-desc { font-size: 12px; color: #666; }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .empty-title { font-size: 24px; margin-bottom: 8px; }
    .empty-desc { color: #666; margin-bottom: 24px; }
    
    /* Loader */
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a4e;
      border-top-color: #0088cc;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #2a2a4e; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a5e; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">📱</div>
        <span class="logo-text">Telegram MCP</span>
      </div>
    </div>
    
    <div class="accounts-list" id="accountsList">
      <!-- Accounts will be rendered here -->
    </div>
    
    <div class="sidebar-footer">
      <button class="btn btn-primary" onclick="showAddAccountModal()">
        + Add Account
      </button>
    </div>
  </aside>
  
  <!-- Main Content -->
  <main class="main-content">
    <div id="mainContent">
      <!-- Dynamic content -->
      <div class="empty-state">
        <div class="empty-icon">📱</div>
        <div class="empty-title">No Account Selected</div>
        <div class="empty-desc">Add a Telegram account to get started</div>
      </div>
    </div>
  </main>
  
  <!-- Add Account Modal -->
  <div class="modal-overlay" id="addAccountModal">
    <div class="modal">
      <h2 class="modal-title">Add Telegram Account</h2>
      
      <div class="form-group">
        <label>Account Name</label>
        <input type="text" id="newAccountName" placeholder="My Account">
      </div>
      
      <div class="form-group">
        <label>API ID</label>
        <input type="text" id="newApiId" placeholder="From my.telegram.org">
      </div>
      
      <div class="form-group">
        <label>API Hash</label>
        <input type="text" id="newApiHash" placeholder="From my.telegram.org">
      </div>
      
      <div class="form-group">
        <label>Phone Number (optional)</label>
        <input type="tel" id="newPhone" placeholder="+1234567890">
      </div>
      
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="hideAddAccountModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addAccount()">Add Account</button>
      </div>
    </div>
  </div>
  
  <!-- Login Modal -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal">
      <h2 class="modal-title" id="loginTitle">Login to Telegram</h2>
      
      <div id="phoneStep">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="loginPhone" placeholder="+1234567890">
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="hideLoginModal()">Cancel</button>
          <button class="btn btn-primary" onclick="sendLoginPhone()">Send Code</button>
        </div>
      </div>
      
      <div id="codeStep" style="display:none;">
        <div class="form-group">
          <label>Verification Code</label>
          <input type="text" id="loginCode" placeholder="12345">
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="hideLoginModal()">Cancel</button>
          <button class="btn btn-primary" onclick="verifyLoginCode()">Verify</button>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>

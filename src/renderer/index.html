<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src *;">
  <title>Telegram MCP Server</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      padding: 30px 0;
      border-bottom: 1px solid #2a2a4e;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      color: #0088cc;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .card {
      background: #12121a;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid #2a2a4e;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #fff;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #0088cc;
    }

    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0088cc 0%, #0066aa 100%);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 136, 204, 0.3);
    }

    .btn-danger {
      background: linear-gradient(135deg, #cc0000 0%, #aa0000 100%);
      color: #fff;
    }

    .btn-danger:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(204, 0, 0, 0.3);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: #1a1a2e;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #666;
    }

    .status-dot.running {
      background: #00C851;
      animation: pulse 2s infinite;
    }

    .status-dot.error {
      background: #ff4444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      flex: 1;
      font-size: 14px;
    }

    .log-container {
      background: #0a0a0f;
      border-radius: 10px;
      padding: 16px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
    }

    .log-entry {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      border-bottom: 1px solid #1a1a2e;
    }

    .log-time {
      color: #444;
      flex-shrink: 0;
    }

    .log-message {
      flex: 1;
      word-break: break-word;
    }

    .log-message.info { color: #2196F3; }
    .log-message.success { color: #00C851; }
    .log-message.warning { color: #ffbb33; }
    .log-message.error { color: #ff4444; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #1a1a2e;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #0088cc;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .auth-step {
      display: none;
    }

    .auth-step.active {
      display: block;
    }

    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 12px;
    }

    .tunnel-info {
      background: #1a1a2e;
      border-radius: 10px;
      padding: 16px;
      margin-top: 16px;
      display: none;
    }

    .tunnel-info.active {
      display: block;
    }

    .tunnel-url {
      background: #0a0a0f;
      padding: 12px;
      border-radius: 6px;
      font-family: monospace;
      word-break: break-all;
      margin-top: 8px;
      color: #00C851;
    }

    .loader {
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Telegram MCP Server</h1>
      <p>Local server that connects to cloud frontend</p>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Not running</span>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-value" id="statReceived">0</div>
        <div class="stat-label">Messages Received</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statSent">0</div>
        <div class="stat-label">Messages Sent</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statUptime">0s</div>
        <div class="stat-label">Uptime</div>
      </div>
    </div>

    <!-- Configuration Card -->
    <div class="card">
      <h2 class="card-title">Configuration</h2>

      <!-- Step 1: Config -->
      <div class="auth-step active" id="stepConfig">
        <div class="form-group">
          <label>Telegram API ID</label>
          <input type="text" id="apiId" placeholder="Enter your API ID from my.telegram.org">
        </div>

        <div class="form-group">
          <label>Telegram API Hash</label>
          <input type="text" id="apiHash" placeholder="Enter your API Hash">
        </div>

        <div class="form-group">
          <label>System Prompt (for AI responses)</label>
          <textarea id="systemPrompt" placeholder="You are a helpful assistant that responds to Telegram messages..."></textarea>
        </div>

        <div class="form-group">
          <label>Auto-start on launch</label>
          <input type="checkbox" id="autoStart">
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" id="saveConfigBtn">Save Configuration</button>
          <button class="btn btn-primary" id="startBtn">Start Server</button>
        </div>

        <p class="hint">Get your API credentials from <a href="#" onclick="require('electron').shell.openExternal('https://my.telegram.org')">my.telegram.org</a></p>
      </div>

      <!-- Step 2: Phone -->
      <div class="auth-step" id="stepPhone">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phoneNumber" placeholder="+1234567890">
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" id="sendPhoneBtn">Send Code</button>
        </div>
      </div>

      <!-- Step 3: Code -->
      <div class="auth-step" id="stepCode">
        <div class="form-group">
          <label>Verification Code</label>
          <input type="text" id="verifyCode" placeholder="Enter the code from Telegram">
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" id="verifyCodeBtn">Verify & Connect</button>
        </div>
      </div>

      <!-- Tunnel Info -->
      <div class="tunnel-info" id="tunnelInfo">
        <label style="font-size: 14px; color: #888;">Tunnel URL (for frontend):</label>
        <div class="tunnel-url" id="tunnelUrl"></div>
      </div>
    </div>

    <!-- Control Card -->
    <div class="card">
      <h2 class="card-title">Server Control</h2>
      <div class="btn-group">
        <button class="btn btn-primary" id="restartBtn">Restart Server</button>
        <button class="btn btn-danger" id="stopBtn">Stop Server</button>
      </div>
    </div>

    <!-- Logs Card -->
    <div class="card">
      <h2 class="card-title">Activity Log</h2>
      <div class="log-container" id="logContainer">
        <div class="log-entry">
          <span class="log-time">--:--:--</span>
          <span class="log-message info">Waiting for server to start...</span>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>

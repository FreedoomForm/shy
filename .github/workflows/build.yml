name: Build Windows Installer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build Windows installer
      run: npm run build:win

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: dist/*.exe
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-installer
        path: dist

    - name: Get version
      id: version
      run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: Release v${{ steps.version.outputs.VERSION }}
        body: |
          ## Telegram MCP Manager v${{ steps.version.outputs.VERSION }}

          ### What's New
          - Mistral AI is now the default provider with pre-configured API key
          - Added 9 AI providers: Mistral, OpenAI, Google AI Studio, Anthropic, DeepSeek, GLM, xAI, Meta AI, Custom
          - Model selection dropdown for each provider
          - Improved AI settings UI

          ### Installation
          Download the installer below and run it to install Telegram MCP Manager.
        files: dist/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
